org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# R8 full mode quebra a desserialização da sessão do Firebase Auth em builds
# minificados: o usuário é deslogado a cada reabertura do app
# (https://github.com/firebase/firebase-android-sdk/issues/6375).
android.enableR8.fullMode=false
